<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 工具 - SwdTool</title>
    <link rel="icon" href="logo.ico" sizes="any">
    <style>
        /* ========== 亮色主题（默认） ========== */
        :root {
            --bg: #f8f9fc;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --accent: #4f6ef7;
            --accent-light: #eef1ff;
            --red: #ef4444;
            --red-light: #fef2f2;
            --green: #10b981;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.06);
            --transition: 0.2s ease;
            --toggle-bg: #e5e7eb;
            --toggle-dot: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.5;
            color: var(--text-primary);
        }

        /* ========== 暗色主题 ========== */
        [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2f3d;
            --text-primary: #e4e6ed;
            --text-secondary: #8b8fa7;
            --text-muted: #5c6078;
            --accent: #6c8cff;
            --accent-light: rgba(108, 140, 255, 0.12);
            --red: #f87171;
            --red-light: #3b1f1f;
            --green: #10b981;
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 0 1px rgba(255,255,255,0.03) inset;
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
            --toggle-bg: #3a4060;
            --toggle-dot: #6c8cff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        [data-theme="dark"] .navbar {
            background: rgba(15,17,23,0.8);
        }
        .navbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            transition: color 0.3s ease;
        }
        .navbar-logo .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }
        .navbar-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 20px;
            transition: var(--transition);
        }
        .navbar-links a:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: var(--transition);
            color: var(--text-primary);
        }
        .theme-toggle:hover {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        /* 主容器 */
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 48px 24px;
            flex: 1;
            width: 100%;
        }

        .tool-header {
            margin-bottom: 32px;
            text-align: center;
        }
        .tool-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: var(--text-primary);
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .tool-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            min-height: 1.5em;
            transition: color 0.3s ease;
        }

        /* 模式切换 */
        .mode-switch {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
        }
        .mode-btn.active {
            background: var(--accent);
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(79, 110, 247, 0.35);
        }
        .mode-btn:hover:not(.active) {
            background: var(--accent-light);
            color: var(--accent);
        }

        /* 输入输出卡片 */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .card label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .card textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
            background: var(--bg);
            color: var(--text-primary);
            transition: var(--transition), background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
            min-height: 120px;
        }
        .card textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.12);
            background: var(--surface);
        }
        .card textarea[readonly] {
            background: #f1f5f9;
            color: var(--text-primary);
            cursor: default;
        }
        [data-theme="dark"] .card textarea[readonly] {
            background: #1e2130;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 8px rgba(79, 110, 247, 0.25);
        }
        .btn:hover {
            background: #3d5ce5;
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.35);
        }
        [data-theme="dark"] .btn:hover {
            background: #5b7ef5;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            box-shadow: var(--shadow-hover);
        }
        [data-theme="dark"] .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: #4a5070;
        }
        .btn-copy {
            background: var(--green);
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
        }
        .btn-copy:hover {
            background: #059669;
        }
        .btn-copy.copied {
            background: #065f46;
            pointer-events: none;
        }

        .error-message {
            margin-top: 8px;
            color: var(--red);
            font-size: 0.85rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 20px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            background: var(--surface);
            margin-top: auto;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer a:hover {
            color: var(--accent);
        }

        .icon-img{display:inline-block;width:1.2em;height:1.2em;vertical-align:middle;}

        @media (max-width: 640px) {
            .main-container {
                padding: 32px 16px;
            }
            .tool-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-logo">
                <span class="logo-mark">Sw</span>
                SwdTool
            </a>
            <ul class="navbar-links">
                <li><a href="index.html">首页</a></li>
                <li>
                    <button class="theme-toggle" id="themeToggle" title="切换亮色/暗色模式" aria-label="切换主题">
                        🌙
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <div class="tool-header">
            <h1>
                <!-- 标题图标：使用外部 SVG，支持主题切换 -->
                <img class="icon-img" data-filename="TexttoBase64" alt="Base64" width="32" height="32"
                     onerror="this.outerHTML='<svg width=32 height=32 viewBox=\'0 0 40 40\' fill=\'none\'><rect x=6 y=8 width=28 height=24 rx=3 stroke=currentColor stroke-width=2.5 stroke-linecap=round stroke-linejoin=round/><path d=\'M12 16h16M12 20h12M12 24h14\' stroke=currentColor stroke-width=2.5 stroke-linecap=round/></svg>'">
                Base64 工具
            </h1>
            <p id="modeDescription">在线 Base64 编码与解码，支持 UTF-8 字符。</p>
        </div>

        <div class="mode-switch">
            <button class="mode-btn active" id="encodeModeBtn">
                📝 文本转 Base64
            </button>
            <button class="mode-btn" id="decodeModeBtn">
                🔓 Base64 转文本
            </button>
        </div>

        <div class="card">
            <label for="inputText" id="inputLabel">输入文本</label>
            <textarea 
                id="inputText" 
                placeholder="在这里输入或粘贴文本..."
                autofocus
            ></textarea>
            <div class="button-group">
                <button class="btn" id="actionBtn">🔒 编码为 Base64</button>
                <button class="btn btn-secondary" id="clearBtn">🗑️ 清空</button>
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="card">
            <label for="outputText" id="outputLabel">Base64 结果</label>
            <textarea 
                id="outputText" 
                readonly 
                placeholder="结果将显示在这里..."
            ></textarea>
            <div class="button-group">
                <button class="btn btn-copy" id="copyBtn">📋 复制结果</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <span>© 2026 SwdTool</span>
        <a href="index.html">返回首页</a>
    </footer>

    <script>
        (function() {
            // ========== 主题与图标管理 ==========
            const themeToggle = document.getElementById('themeToggle');

            function getTheme() {
                const saved = localStorage.getItem('swdtool-theme');
                if (saved) return saved;
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return 'dark';
                }
                return 'light';
            }

            // 更新所有带有 data-filename 属性的图标路径
            function updateIcons() {
                const currentTheme = getTheme();
                const suffix = currentTheme === 'dark' ? '-b' : '-w';
                document.querySelectorAll('[data-filename]').forEach(img => {
                    const fileName = img.getAttribute('data-filename');
                    img.src = `iconsvg/${fileName}${suffix}.svg`;
                });
            }

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeToggle.textContent = '☀️';
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    themeToggle.textContent = '🌙';
                }
                localStorage.setItem('swdtool-theme', theme);
                // 更新图标路径
                updateIcons();
            }

            const currentTheme = getTheme();
            applyTheme(currentTheme);

            themeToggle.addEventListener('click', () => {
                const newTheme = document.documentElement.hasAttribute('data-theme') ? 'light' : 'dark';
                applyTheme(newTheme);
            });

            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (!localStorage.getItem('swdtool-theme')) {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            }

            // ========== Base64 工具逻辑（完全保留） ==========
            let currentMode = 'encode';

            const inputText = document.getElementById('inputText');
            const outputText = document.getElementById('outputText');
            const actionBtn = document.getElementById('actionBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            const errorMessage = document.getElementById('errorMessage');
            const encodeModeBtn = document.getElementById('encodeModeBtn');
            const decodeModeBtn = document.getElementById('decodeModeBtn');
            const inputLabel = document.getElementById('inputLabel');
            const outputLabel = document.getElementById('outputLabel');
            const modeDescription = document.getElementById('modeDescription');

            function utf8ToBase64(str) {
                const encoder = new TextEncoder();
                const bytes = encoder.encode(str);
                let binaryString = '';
                bytes.forEach(byte => {
                    binaryString += String.fromCharCode(byte);
                });
                return btoa(binaryString);
            }

            function base64ToUtf8(base64Str) {
                const binaryString = atob(base64Str);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const decoder = new TextDecoder('utf-8');
                return decoder.decode(bytes);
            }

            function updateUIForMode() {
                if (currentMode === 'encode') {
                    inputLabel.textContent = '输入文本';
                    outputLabel.textContent = 'Base64 结果';
                    actionBtn.innerHTML = '🔒 编码为 Base64';
                    inputText.placeholder = '在这里输入或粘贴文本...';
                    outputText.placeholder = '编码后的 Base64 字符串将显示在这里...';
                    modeDescription.textContent = '将任意文本转换为 Base64 格式，支持 UTF-8 字符。';
                    encodeModeBtn.classList.add('active');
                    decodeModeBtn.classList.remove('active');
                } else {
                    inputLabel.textContent = '输入 Base64';
                    outputLabel.textContent = '解码结果';
                    actionBtn.innerHTML = '🔓 解码为文本';
                    inputText.placeholder = '在这里输入 Base64 编码的字符串...';
                    outputText.placeholder = '解码后的文本将显示在这里...';
                    modeDescription.textContent = '将 Base64 字符串解码为原始文本，支持 UTF-8 字符。';
                    decodeModeBtn.classList.add('active');
                    encodeModeBtn.classList.remove('active');
                }
                errorMessage.classList.remove('show');
                outputText.value = '';
            }

            function performAction() {
                const raw = inputText.value.trim();
                errorMessage.classList.remove('show');
                
                if (!raw) {
                    errorMessage.textContent = '⚠️ 请输入内容';
                    errorMessage.classList.add('show');
                    outputText.value = '';
                    return;
                }

                try {
                    if (currentMode === 'encode') {
                        outputText.value = utf8ToBase64(raw);
                    } else {
                        outputText.value = base64ToUtf8(raw);
                    }
                    outputText.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } catch (err) {
                    if (currentMode === 'encode') {
                        errorMessage.textContent = '❌ 编码失败：' + err.message;
                    } else {
                        errorMessage.textContent = '❌ 解码失败：请检查输入是否为有效的 Base64 字符串';
                    }
                    errorMessage.classList.add('show');
                    outputText.value = '';
                }
            }

            encodeModeBtn.addEventListener('click', () => {
                if (currentMode !== 'encode') {
                    currentMode = 'encode';
                    updateUIForMode();
                }
            });
            decodeModeBtn.addEventListener('click', () => {
                if (currentMode !== 'decode') {
                    currentMode = 'decode';
                    updateUIForMode();
                }
            });

            actionBtn.addEventListener('click', performAction);

            clearBtn.addEventListener('click', () => {
                inputText.value = '';
                outputText.value = '';
                errorMessage.classList.remove('show');
                inputText.focus();
            });

            copyBtn.addEventListener('click', async () => {
                const result = outputText.value;
                if (!result) {
                    alert('没有可复制的内容，请先执行转换。');
                    return;
                }
                try {
                    await navigator.clipboard.writeText(result);
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = '✅ 已复制';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHTML;
                        copyBtn.classList.remove('copied');
                    }, 2000);
                } catch {
                    outputText.select();
                    document.execCommand('copy');
                    alert('已复制到剪贴板！');
                }
            });

            inputText.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    performAction();
                }
            });

            updateUIForMode();
            console.log('🔤 Base64 工具（编码/解码）已就绪');
        })();
    </script>
</body>
</html>
