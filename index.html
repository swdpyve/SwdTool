<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwdTool - 便民工具集</title>
    <link rel="icon" href="logo.ico" sizes="any">
    <style>
        :root {
            --bg: #f8f9fc;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --accent: #4f6ef7;
            --accent-light: #eef1ff;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-hover: 0 10px 25px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
            --transition: 0.2s ease;
            --toggle-bg: #e5e7eb;
            --toggle-dot: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.5;
            color: var(--text-primary);
        }

        [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2f3d;
            --text-primary: #e4e6ed;
            --text-secondary: #8b8fa7;
            --text-muted: #5c6078;
            --accent: #6c8cff;
            --accent-light: rgba(108, 140, 255, 0.12);
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 0 1px rgba(255,255,255,0.03) inset;
            --shadow-hover: 0 10px 25px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.05) inset;
            --toggle-bg: #3a4060;
            --toggle-dot: #6c8cff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .navbar {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        [data-theme="dark"] .navbar { background: rgba(15,17,23,0.8); }
        .navbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            transition: color 0.3s ease;
        }
        .navbar-logo .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }
        .navbar-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 20px;
            transition: var(--transition);
        }
        .navbar-links a:hover { background: var(--accent-light); color: var(--accent); }
        .navbar-links a.active { background: var(--accent-light); color: var(--accent); }

        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: var(--transition);
            color: var(--text-primary);
        }
        .theme-toggle:hover { background: var(--accent-light); border-color: var(--accent); }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px;
            flex: 1;
            width: 100%;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }
        .page-header p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
            transition: color 0.3s ease;
        }

        .search-wrapper {
            max-width: 520px;
            margin: 0 auto 32px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px 12px 44px;
            border-radius: 28px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.12);
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: var(--transition), background-color 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
        }
        .tool-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .tool-card .tool-icon { font-size: 1.8rem; margin-bottom: 2px; }
        .tool-card h3 { font-size: 1rem; font-weight: 600; color: var(--text-primary); transition: color 0.3s ease; }
        .tool-card p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
        .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: auto;
        }
        .tool-tag {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 14px;
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 500;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px dashed var(--border);
            color: var(--text-secondary);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.7; }
        .empty-state h2 { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
        .empty-state p { margin-bottom: 16px; font-size: 0.9rem; }

        .footer {
            border-top: 1px solid var(--border);
            padding: 20px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            background: var(--surface);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .footer a { color: var(--text-secondary); text-decoration: none; transition: color 0.3s ease; }
        .footer a:hover { color: var(--accent); }

        @media (max-width: 640px) {
            .main-container { padding: 32px 16px; }
            .page-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-logo">
                <span class="logo-mark">Sw</span>
                SwdTool
            </a>
            <ul class="navbar-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li>
                    <button class="theme-toggle" id="themeToggle" title="切换亮色/暗色模式" aria-label="切换主题">🌙</button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <div class="page-header">
            <h1>便民工具集</h1>
            <p>轻量、便捷的在线工具，无需安装，即开即用。</p>
        </div>

        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索工具名称、描述或标签..." autocomplete="off">
        </div>

        <div class="tools-grid" id="toolsGrid"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="icon">🔍</div>
            <h2>未找到匹配的工具</h2>
            <p>尝试其他关键词或清空搜索查看全部工具</p>
        </div>
    </main>

    <footer class="footer">
        <span>© 2026 SwdTool</span>
        <a href="#">隐私政策</a>
        <a href="#">MIT License</a>
        <span>为开发者而生</span>
    </footer>

    <script>
        (function() {
            // ========== 主题管理 ==========
            const themeToggle = document.getElementById('themeToggle');
            function getTheme() {
                const saved = localStorage.getItem('swdtool-theme');
                if (saved) return saved;
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
                return 'light';
            }
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeToggle.textContent = '☀️';
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    themeToggle.textContent = '🌙';
                }
                localStorage.setItem('swdtool-theme', theme);
            }
            applyTheme(getTheme());
            themeToggle.addEventListener('click', () => {
                const newTheme = document.documentElement.hasAttribute('data-theme') ? 'light' : 'dark';
                applyTheme(newTheme);
            });
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (!localStorage.getItem('swdtool-theme')) applyTheme(e.matches ? 'dark' : 'light');
                });
            }

            // ========== 工具数据（含标签） ==========
            const toolsData = [
                {
                    id: 'base64',
                    name: 'Base64 工具',
                    description: '在线 Base64 编码与解码，支持 UTF-8 文本',
                    icon: '🔤',
                    url: 'TexttoBase64.html',
                    tags: ['URL编/解码', 'URL16进制编/解码', 'Base64编/解码', 'Base32编/解码', 'Escape编/解码', 'Gzip编/解码']
                },
                {
                    id: 'md5',
                    name: 'MD5 加密',
                    description: '将文本转换为 MD5 哈希值，支持32/16位大小写',
                    icon: '🔐',
                    url: 'MD5text.html',
                    tags: ['MD5加密', '文本加密', '在线哈希', '数据校验32/16位MD5', '安全加密']
                },
                {
                    id: 'obfuscator',
                    name: 'JS 代码混淆',
                    description: '高级混淆加密，变量名混淆、字符串加密、控制流扁平化、调试保护',
                    icon: '🛡️',
                    url: 'JSobfuscator.html',
                    tags: ['代码混淆', 'JS防盗用', 'JS加密', '域名锁定', '多级混淆', 'JS防复制']
                },
                {
                    id: 'zip',
                    name: '多文件ZIP打包',
                    description: '批量选择文件，纯前端打包为ZIP下载，支持去重',
                    icon: '📦',
                    url: 'FileToZIP.html',
                    tags: ['文件压缩', 'ZIP打包', '本地文件打包', '多文件压缩', '文件去重压缩', '离线ZIP打包']
                },
                {
                    id: 'unzip',
                    name: 'ZIP在线解压',
                    description: '上传ZIP文件，在线预览内容并单独下载所需文件',
                    icon: '📂',
                    url: 'ZIPToFile.html',
                    tags: ['在线ZIP解压', '免安装解压', '单文件下载', '本地解压', '免费解压工具', 'ZIP文件提取']
                },
                {
                    id: 'photosheet',
                    name: 'A4纸自动排版',
                    description: '上传照片，自动排版证件照到A4纸，支持自定义边距',
                    icon: '🖼️',
                    url: 'PhotoSheet.html',
                    tags: ['证件照排版', 'A4排版', '照片排版','图片排版', '打印排版', '一寸照', '二寸照']
                },
                {
                    id: 'resize',
                    name: '图片尺寸调整',
                    description: '上传图片，滑块缩放或自定义宽高，本地高清下载',
                    icon: '📐',
                    url: 'SetPhotoSize.html',
                    tags: ['图片尺寸调整', '修改图片大小', '本地图片处理', 'JPG调整大小', 'PNG缩放']
                },
                {
                    id: 'qrcode',
                    name: '在线二维码生成',
                    description: '文本/链接生成标准二维码，支持容错率、尺寸、边距设置',
                    icon: '📱',
                    url: 'GenerateQRcode.html',
                    tags: ['二维码生成', '容错率设置', '二维码导出', '点状二维码', '二维码尺寸']
                },
                {
                    id: 'pdfviewer',
                    name: 'PDF在线阅读器',
                    description: '在线预览PDF文档，支持翻页、缩放、拖拽上传，高清渲染',
                    icon: '📄',
                    url: 'PDFViewer.html',
                    tags: ['PDF阅读器', 'PDF查看器', 'PDF翻页', 'PDF页缩放', '文档预览', 'PDF预览']
                },
                {
                    id: 'pixelart',
                    name: '图片像素画',
                    description: '上传图片转换为像素画风格，支持调节像素块大小与目标分辨率',
                    icon: '🎨',
                    url: 'PixelArt.html',
                    tags: ['像素画', '图片像素化', '像素风格', '图片处理', '像素转换', '低分辨率']
                }
            ];

            const toolsGrid = document.getElementById('toolsGrid');
            const emptyState = document.getElementById('emptyState');
            const searchInput = document.getElementById('searchInput');

            function renderTools(filterText = '') {
                const query = filterText.trim().toLowerCase();
                const filtered = toolsData.filter(tool => {
                    if (!query) return true;
                    return tool.name.toLowerCase().includes(query) ||
                           tool.description.toLowerCase().includes(query) ||
                           tool.tags.some(tag => tag.toLowerCase().includes(query));
                });

                if (filtered.length === 0) {
                    toolsGrid.innerHTML = '';
                    toolsGrid.style.display = 'none';
                    emptyState.style.display = 'block';
                } else {
                    toolsGrid.style.display = 'grid';
                    emptyState.style.display = 'none';
                    toolsGrid.innerHTML = filtered.map(tool => {
                        const tagsHtml = tool.tags.map(t => `<span class="tool-tag">${t}</span>`).join('');
                        return `
                            <a href="${tool.url}" class="tool-card">
                                <div class="tool-icon">${tool.icon}</div>
                                <h3>${tool.name}</h3>
                                <p>${tool.description}</p>
                                <div class="tool-tags">${tagsHtml}</div>
                            </a>
                        `;
                    }).join('');
                }
            }

            renderTools();

            searchInput.addEventListener('input', (e) => {
                renderTools(e.target.value);
            });

            console.log('🛠️ SwdTool 已就绪，当前工具数量：' + toolsData.length);
        })();
    </script>
</body>
</html>
