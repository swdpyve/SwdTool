<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwdTool - 开发者工具集</title>
    <link rel="icon" href="logo.ico" sizes="any">
    <style>
        /* ========== 亮色主题（默认） ========== */
        :root {
            --bg: #f8f9fc;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --accent: #4f6ef7;
            --accent-light: #eef1ff;
            --accent-hover: #3d5ce5;
            --btn-outline-hover: #f1f5f9;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-hover: 0 10px 25px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
            --navbar-bg: rgba(255,255,255,0.8);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --toggle-bg: #e5e7eb;
            --toggle-dot: #ffffff;
        }

        /* ========== 暗色主题 ========== */
        [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2f3d;
            --text-primary: #e4e6ed;
            --text-secondary: #8b8fa7;
            --text-muted: #5c6078;
            --accent: #6c8cff;
            --accent-light: rgba(108, 140, 255, 0.12);
            --accent-hover: #5b7ef5;
            --btn-outline-hover: rgba(255,255,255,0.05);
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 0 1px rgba(255,255,255,0.03) inset;
            --shadow-hover: 0 10px 25px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.05) inset;
            --navbar-bg: rgba(15,17,23,0.8);
            --toggle-bg: #3a4060;
            --toggle-dot: #6c8cff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.5;
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 导航栏 */
        .navbar {
            background: var(--navbar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .navbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            transition: color 0.3s ease;
        }
        .navbar-logo .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }
        .navbar-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 20px;
            transition: var(--transition);
        }
        .navbar-links a:hover {
            background: var(--accent-light);
            color: var(--accent);
        }
        .navbar-links a.active {
            background: var(--accent-light);
            color: var(--accent);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: var(--transition);
            color: var(--text-primary);
            flex-shrink: 0;
        }
        .theme-toggle:hover {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        /* 主容器 */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px;
            flex: 1;
            width: 100%;
        }

        .page-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }
        .page-header p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
            transition: color 0.3s ease;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: var(--transition), background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
        }
        .tool-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .tool-card .tool-icon {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }
        .tool-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }
        .tool-card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            transition: color 0.3s ease;
        }

        /* 空状态 */
        .empty-placeholder {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px dashed var(--border);
            color: var(--text-secondary);
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        .empty-placeholder .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.7;
        }
        .empty-placeholder h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }
        .empty-placeholder p {
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .upcoming-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .upcoming-tag {
            background: var(--accent-light);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .upcoming-tag:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* 页脚 */
        .footer {
            border-top: 1px solid var(--border);
            padding: 20px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            background: var(--surface);
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer a:hover {
            color: var(--accent);
        }

        @media (max-width: 640px) {
            .main-container {
                padding: 32px 16px;
            }
            .page-header h1 {
                font-size: 1.8rem;
            }
            .navbar-links a {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-logo">
                <span class="logo-mark">Sw</span>
                SwdTool
            </a>
            <ul class="navbar-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li>
                    <button class="theme-toggle" id="themeToggle" title="切换亮色/暗色模式" aria-label="切换主题">
                        🌙
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <div class="page-header">
            <h1>开发者工具集</h1>
            <p>轻量、便捷的在线工具，无需安装，即开即用。</p>
        </div>

        <div class="tools-grid" id="toolsGrid"></div>

        <div class="empty-placeholder" id="emptyPlaceholder" style="display: none;">
            <div class="icon">📦</div>
            <h2>暂无工具</h2>
            <p>工具集正在建设中，以下功能即将上线</p>
            <div class="upcoming-tags">
                <span class="upcoming-tag">🔐 SHA-256 加密</span>
                <span class="upcoming-tag">📝 Base64 编解码</span>
                <span class="upcoming-tag">📋 JSON 格式化</span>
                <span class="upcoming-tag">🔄 时间戳转换</span>
                <span class="upcoming-tag">🎲 UUID 生成器</span>
                <span class="upcoming-tag">🔑 MD5 哈希</span>
            </div>
        </div>
    </main>

    <footer class="footer">
        <span>© 2026 SwdTool</span>
        <a href="#">隐私政策</a>
        <a href="#">MIT License</a>
        <span>为开发者而生</span>
    </footer>

    <script>
        (function() {
            // ========== 工具数据 ==========
            const toolsData = [
                {
                    id: 'base64',
                    name: 'Base64 工具',
                    description: '在线 Base64 编码与解码，支持 UTF-8 文本',
                    icon: '🔤',
                    url: 'TexttoBase64.html'
                },
                {
                    id: 'md5',
                    name: 'MD5 加密',
                    description: '将文本转换为 MD5 哈希值，支持32/16位大小写',
                    icon: '🔐',
                    url: 'MD5text.html'
                },
                {
                    id: 'obfuscator',
                    name: 'JS 代码混淆',
                    description: '高级混淆加密，变量名混淆、字符串加密、控制流扁平化、调试保护',
                    icon: '🛡️',
                    url: 'JSobfuscator.html'
                }
            ];

            const toolsGrid = document.getElementById('toolsGrid');
            const emptyPlaceholder = document.getElementById('emptyPlaceholder');
            const themeToggle = document.getElementById('themeToggle');

            // ========== 主题管理 ==========
            function getTheme() {
                const saved = localStorage.getItem('swdtool-theme');
                if (saved) return saved;
                // 跟随系统偏好
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return 'dark';
                }
                return 'light';
            }

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeToggle.textContent = '☀️';
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    themeToggle.textContent = '🌙';
                }
                localStorage.setItem('swdtool-theme', theme);
            }

            // 初始化主题
            const currentTheme = getTheme();
            applyTheme(currentTheme);

            // 切换主题
            themeToggle.addEventListener('click', () => {
                const newTheme = document.documentElement.hasAttribute('data-theme') ? 'light' : 'dark';
                applyTheme(newTheme);
            });

            // 监听系统主题变化
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (!localStorage.getItem('swdtool-theme')) {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            }

            // ========== 渲染工具卡片 ==========
            function renderTools() {
                if (toolsData.length === 0) {
                    toolsGrid.innerHTML = '';
                    toolsGrid.style.display = 'none';
                    emptyPlaceholder.style.display = 'block';
                    return;
                }

                toolsGrid.style.display = 'grid';
                emptyPlaceholder.style.display = 'none';
                toolsGrid.innerHTML = toolsData.map(tool => {
                    return `
                        <a href="${tool.url}" class="tool-card">
                            <div class="tool-icon">${tool.icon}</div>
                            <h3>${tool.name}</h3>
                            <p>${tool.description}</p>
                        </a>
                    `;
                }).join('');
            }

            renderTools();

            // 点击即将推出标签
            emptyPlaceholder.addEventListener('click', (e) => {
                const tag = e.target.closest('.upcoming-tag');
                if (tag) {
                    alert(`✨ "${tag.textContent.trim()}" 即将推出，敬请期待！`);
                }
            });

            console.log('🛠️ SwdTool 已就绪，当前工具数量：' + toolsData.length);
            console.log('🎨 主题模式：' + currentTheme);
        })();
    </script>
</body>
</html>
